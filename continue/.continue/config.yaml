# Moved from Ollama to llama.cpp

# 🚨🚨🚨 Requires https://github.com/t20e/Local_AI and start the local-ai so that Continue can connected to the local APIs

name: Local Config
version: 1.0.0
schema: v1

models:
    - name: Gemma 4 31B (Chat)
      provider: openai # openai provider = OpenAI-compatible REST API (works with llama.cpp's /v1 endpoint)
      model: gemma-4-31b
      apiBase: http://localhost:8080/v1
      roles:
          - chat
          - edit
          - apply

    - name: Qwen2.5 Coder 3B (Autocomplete)
      provider: openai # openai provider = OpenAI-compatible REST API (works with llama.cpp's /v1 endpoint)
      model: ggml-org/Qwen2.5-Coder-3B-Q8_0-GGUF:Q8_0
      apiBase: http://localhost:8081/v1
      roles:
          - autocomplete

    - name: Nomic Embed
      provider: openai
      model: nomic-embed
      apiBase: http://localhost:8082/v1
      roles:
          - embed
