# Enable 256-color and true-color (24 bit) support in tmux
set -g default-terminal "tmux-256color"
# set -g default-terminal "screen-256color" # set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" #Overide to enable true-color for compatible terminals


# ============== General Settings ============== 
# Set prefix key
unbind C-b
set -g prefix C-Space # Set new prefix key to `CTRL+Space`

# Refresh tmux config with `r`
unbind r
bind r source-file ~/.config/tmux/tmux.conf
set -g set-clipboard on # Use system clipboard
set -g mouse on # Enable mouse support
set -g status-interval 3 # Update the status bar every 3 seconds (default is 15)
set -g detach-on-destroy off # Don't exit from tmux when closing a session
set-window-option -g allow-rename off

# Start windows and panes at index 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g status-position top # Set the status bar at the top

# === Window Splitting === 
# Split horizontally in CWD with `\`
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with `-`
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# Open new tmux window in the same path
bind c new-window -c "#{pane_current_path}"


# === Window Resizing === 
# Use vim arrow keys to resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z # Use m to maximize a pane


# === Copy And Pasting ===
# Enable vi mode to allow vim movements
set-window-option -g  mode-keys vi

# Start selecting text with `v`
bind-key -T copy-mode-vi 'v' send -X begin-selection 

# Copy text with `y`
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Don't exit copy mode when dragging with mousing
unbind -T copy-mode-vi MouseDragEnd1Pane



# ============== Plugins ============== 
# List of plugins
set -g @plugin 'tmux-plugins/tpm' # Package manager, after calling `tmux` use `prefix+I` to install any new plugins that you add below!

set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect' # Persist tmux sessions after computer restarts
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically saves sessions every 15 minutes
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags

# Initialize the plugins
set -g @resurrect-capture-pane-contents 'on'

# Catppuccin plugin config
set -g @catppuccin_flavor 'latte' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"






# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
